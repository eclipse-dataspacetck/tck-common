---
name: "Publish Maven Artifacts"
description: "Build and publish maven artifacts to repository"

inputs:
  gpg-private-key:
    description: the gpg private key used to publish
    required: true
  gpg-passphrase:
    description: the gpg passphrase used to publish
    required: true
  username:
    description: repository username
    required: true
  password:
    description: repository password
    required: true

runs:
  using: "composite"
  steps:
    - uses: eclipse-dataspacetck/tck-common/.github/actions/setup-build@main

    - uses: eclipse-dataspacetck/tck-common/.github/actions/import-gpg-key@main
      with:
        gpg-private-key: ${{ inputs.gpg-private-key }}

    - name: Extract GPG key ID
      id: extract_keyid
      shell: bash
      run: |
        KEY_ID=$(gpg --list-secret-keys --keyid-format SHORT 2>/dev/null | grep -E '^ssb.*\[S\]' | head -1 | sed -E 's/.*\/([A-F0-9]{8}).*/\1/')
        if [ -z "$KEY_ID" ]; then
          KEY_ID=$(gpg --list-secret-keys --keyid-format SHORT 2>/dev/null | grep '^sec' | head -1 | sed -E 's/.*\/([A-F0-9]{8}).*/\1/')
        fi
        echo "keyId=${KEY_ID}" >> $GITHUB_OUTPUT

    - name: Publish to maven central
      shell: bash
      env:
        ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ inputs.username }}
        ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ inputs.password }}

        ORG_GRADLE_PROJECT_signingKeyId: ${{ steps.extract_keyid.outputs.keyId }}
        ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ inputs.gpg-private-key }}
        ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ inputs.gpg-passphrase }}
      run: ./gradlew publishToMavenCentral -Psigning.gnupg.executable=gpg -Psigning.gnupg.passphrase="${{ inputs.gpg-passphrase }}" --stacktrace


